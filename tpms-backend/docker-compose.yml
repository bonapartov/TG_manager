version: '3.9'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: tpms-postgres
    environment:
      POSTGRES_DB: tpms_db
      POSTGRES_USER: tpms
      POSTGRES_PASSWORD: tpms_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tpms"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tpms-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: tpms-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - tpms-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tpms-backend
    environment:
      DATABASE_URL: postgresql://tpms:tpms_password@postgres:5432/tpms_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: your-secret-key-here-change-in-production
      ENCRYPTION_KEY: your-encryption-key-32-chars!!
      DEBUG: "true"
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tpms-network

  # Celery worker
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tpms-celery-worker
    command: celery -A app.core.celery worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://tpms:tpms_password@postgres:5432/tpms_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: your-secret-key-here-change-in-production
      ENCRYPTION_KEY: your-encryption-key-32-chars!!
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tpms-network

  # Celery beat scheduler
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tpms-celery-beat
    command: celery -A app.core.celery beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://tpms:tpms_password@postgres:5432/tpms_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: your-secret-key-here-change-in-production
      ENCRYPTION_KEY: your-encryption-key-32-chars!!
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tpms-network

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: tpms-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./uploads:/var/www/uploads:ro
    depends_on:
      - backend
    networks:
      - tpms-network

volumes:
  postgres_data:
  redis_data:

networks:
  tpms-network:
    driver: bridge